<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LMMS WebAssembly</title>
<style>
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #1a1a1a; }
  #status { color: #ccc; font-family: sans-serif; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 10; pointer-events: none; }
  .spinner { width: 40px; height: 40px; border: 3px solid #555; border-top-color: #0af; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  #qt-canvas { display: block; width: 100%; height: 100%; }
</style>
</head>
<body>
<div id="status"><div class="spinner"></div>Loading LMMS&hellip;</div>
<div id="errors" style="position:absolute;bottom:0;left:0;right:0;max-height:30%;overflow:auto;background:rgba(200,0,0,0.9);color:#fff;font:11px monospace;padding:8px;display:none;z-index:999;"></div>
<script>
  var _errs = [];
  function _logErr(tag, msg) { _errs.push('['+tag+'] '+msg); var e=document.getElementById('errors'); if(e){e.style.display='block';e.textContent=_errs.slice(-30).join('\n');} console.error(tag, msg); }
  window.onerror = function(m,s,l,c,e) { _logErr('onerror', m+' @ '+s+':'+l); if(e&&e.stack) _logErr('onerror-stack', e.stack); return false; };
  window.addEventListener('error', function(ev) { if(ev.message && ev.message !== '') _logErr('error-ev', ev.message+' @ '+ev.filename+':'+ev.lineno); if(ev.error&&ev.error.stack) _logErr('error-stack', ev.error.stack); });
  window.addEventListener('unhandledrejection', function(ev) { _logErr('unhandled', ev.reason); if(ev.reason&&ev.reason.stack) _logErr('unhandled-stack', ev.reason.stack); });
  // Fix Qt WASM clipboard permission queries
  (function() {
    var orig = navigator.permissions.query.bind(navigator.permissions);
    navigator.permissions.query = function(desc) {
      if (!desc || desc.name === 'clipboard-read' || desc.name === 'clipboard-write')
        return Promise.resolve({ state: 'prompt', onchange: null });
      return orig(desc);
    };
  })();
  // Guard against empty/invalid CSS selectors from Qt WASM
  // Also prevents null returns that cause addEventListener crashes
  (function() {
    function bad(s) { return !s || s === '#' || /^#\s*$/.test(s); }
    var _dummy = null;
    function dummy() {
      if (!_dummy) { _dummy = document.createElement('div'); _dummy.id = '_qt_dummy'; _dummy.style.display = 'none'; document.body.appendChild(_dummy); }
      return _dummy;
    }
    var qs = Document.prototype.querySelector;
    Document.prototype.querySelector = function(s) { var r = qs.call(this, s); return r || (bad(s) ? null : dummy()); };
    var qsa = Document.prototype.querySelectorAll;
    Document.prototype.querySelectorAll = function(s) { var r = qsa.call(this, s); return r.length ? r : (bad(s) ? [] : [dummy()]); };
    var eqs = Element.prototype.querySelector;
    Element.prototype.querySelector = function(s) { var r = eqs.call(this, s); return r || (bad(s) ? null : dummy()); };
    var eqsa = Element.prototype.querySelectorAll;
    Element.prototype.querySelectorAll = function(s) { var r = eqsa.call(this, s); return r.length ? r : (bad(s) ? [] : [dummy()]); };
  })();
</script>
<script>
  var Module = {
    noExitRuntime: true,
    arguments: ['--allowroot', '-platform', 'wasm'],
    preRun: [function() {
      ENV.QT_LOGGING_RULES = '*.debug=false';
      ENV.QT_QPA_PLATFORM = 'wasm';
      ENV.QT_QPA_FONTDIR = '/fonts';
    }],
    canvas: (function() { var c = document.createElement('canvas'); c.id = 'qt-canvas'; document.body.appendChild(c); return c; })(),
    setStatus: function(text) {
      var s = document.getElementById('status');
      if (s) s.textContent = text || 'Running...';
      if (text === '') { var el = document.getElementById('status'); if (el) el.style.display = 'none'; }
    },
    onAbort: function() { _logErr('abort', 'Suppressed abort'); },
    onRuntimeInitialized: function() {
      _logErr('info', 'Runtime initialized OK');
      var origMain = Module._main;
      if (origMain) {
        Module._main = function() {
          try { return origMain.apply(this, arguments); }
          catch(e) {
            _logErr('main-err', 'Caught: '+e.message);
            if (!(e instanceof WebAssembly.RuntimeError)) throw e;
          }
        };
      }
    },
    print: function(s) { _logErr('stdout', s); console.log(s); },
    printErr: function(s) {
      if (s === 'Aborted()' || s.indexOf('Aborted') === 0) { _logErr('stderr', s+' (suppressed)'); return; }
      _logErr('stderr', s); console.error(s);
    },
    instantiateWasm: function(imports, successCallback) {
      for (var mod in imports) {
        var m = imports[mod];
        for (var key in m) {
          if (typeof m[key] !== 'function') continue;
          var fn = m[key], k = key;
          if (k === 'abort' || k === '_abort' || (''+fn).indexOf('abort(') >= 0) {
            m[key] = function() { _logErr('abort-catch', k+' intercepted'); };
            continue;
          }
          m[key] = (function(orig, name) {
            return function() { try { return orig.apply(this, arguments); } catch(e) { return 0; } };
          })(fn, k);
        }
      }
      WebAssembly.instantiateStreaming
        ? WebAssembly.instantiateStreaming(fetch('lmms.wasm?v=nocall'), imports).then(
            function(r) { successCallback(r.instance, r.module); },
            function(e) { Module.printErr('WASM instantiation failed: ' + e); throw e; })
        : WebAssembly.instantiate(fetch('lmms.wasm?v=nocall').then(function(r) { return r.arrayBuffer(); }), imports).then(
            function(r) { successCallback(r.instance, r.module); },
            function(e) { Module.printErr('WASM instantiation failed: ' + e); throw e; });
      return {};
    },
  };
</script>
<script src="lmms.js"></script>
</body>
</html>
